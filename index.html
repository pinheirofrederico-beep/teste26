<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOHABIT OS | v3.0 Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #0070ff;
            --bg: #050505;
            --surface: #111111;
            --text: #ffffff;
            --text-dim: #777;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: all 0.3s ease; }

        body {
            background-color: var(--bg);
            color: var(--text);
            background-image: radial-gradient(circle at top right, #001a11 0%, transparent 40%);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* --- SISTEMA DE XP --- */
        .xp-header {
            background: var(--surface);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .level-badge {
            background: var(--primary);
            color: black;
            font-weight: 800;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 1.2rem;
        }

        .xp-bar-container { flex: 1; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; }

        /* --- GRID PRINCIPAL --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            position: relative;
        }

        .card:hover { border-color: var(--primary); transform: translateY(-3px); }

        /* --- TIMER --- */
        .timer-display {
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            margin: 15px 0;
            font-variant-numeric: tabular-nums;
        }

        .btn-group { display: flex; gap: 10px; }

        button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            background: var(--border);
            color: white;
        }

        button.main { background: var(--primary); color: black; }
        button:hover { opacity: 0.8; transform: scale(1.02); }

        /* --- INPUTS --- */
        input {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px;
        }

        .item-log {
            font-size: 0.85rem; padding: 8px; border-bottom: 1px solid #222; color: var(--text-dim);
        }

        #notif {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: black; padding: 12px 30px;
            border-radius: 50px; font-weight: 700; display: none; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="xp-header">
            <div class="level-badge" id="lvl">LVL 1</div>
            <div style="flex: 1">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.8rem;">
                    <span>XP para o próximo nível</span>
                    <span id="xpText">0 / 100</span>
                </div>
                <div class="xp-bar-container">
                    <div class="xp-bar-fill" id="xpBar"></div>
                </div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>⏱️ Modo Foco</h3>
                <div class="timer-display" id="timer">25:00</div>
                <div class="btn-group">
                    <button class="main" onclick="toggleTimer()" id="btnStart">INICIAR</button>
                    <button onclick="resetTimer()">RESET</button>
                </div>
            </div>

            <div class="card">
                <h3>💧 Hidratação</h3>
                <h2 style="margin: 10px 0;" id="waterTxt">0.0L</h2>
                <div class="btn-group">
                    <button class="main" onclick="addAction('water', 0.25)">+ 250ml</button>
                    <button onclick="addAction('water', 0.5)">+ 500ml</button>
                </div>
            </div>

            <div class="card">
                <h3>🍎 Log Nutricional</h3>
                <input type="text" id="mealIn" placeholder="Ex: Frango e batata doce...">
                <div id="mealLog"></div>
            </div>
        </div>
    </div>

    <div id="notif">+ XP Adicionado!</div>

    <script>
        // --- ESTADO GLOBAL ---
        let state = JSON.parse(localStorage.getItem('biohabit_v3')) || {
            xp: 0,
            lvl: 1,
            water: 0,
            meals: []
        };

        // --- LÓGICA DE XP ---
        function addXP(amount) {
            state.xp += amount;
            if(state.xp >= 100) {
                state.xp = 0;
                state.lvl++;
                showNotif("🚀 NÍVEL AUMENTOU!");
            }
            save();
            render();
        }

        // --- TIMER ---
        let timerSeconds = 1500;
        let timerInterval = null;

        function toggleTimer() {
            const btn = document.getElementById('btnStart');
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                btn.innerText = "RETOMAR";
            } else {
                btn.innerText = "PAUSAR";
                timerInterval = setInterval(() => {
                    timerSeconds--;
                    updateTimerDisplay();
                    if(timerSeconds <= 0) {
                        clearInterval(timerInterval);
                        addXP(50);
                        showNotif("Foco concluído! +50 XP");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timerSeconds = 1500;
            updateTimerDisplay();
            document.getElementById('btnStart').innerText = "INICIAR";
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // --- AÇÕES ---
        function addAction(type, val) {
            if(type === 'water') {
                state.water += val;
                addXP(10);
                showNotif("+10 XP por hidratar!");
            }
            save();
            render();
        }

        document.getElementById('mealIn').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value !== "") {
                state.meals.push(e.target.value);
                addXP(20);
                e.target.value = "";
                showNotif("+20 XP por nutrir!");
                save();
                render();
            }
        });

        // --- ENGINE ---
        function save() { localStorage.setItem('biohabit_v3', JSON.stringify(state)); }

        function render() {
            document.getElementById('lvl').innerText = `LVL ${state.lvl}`;
            document.getElementById('xpBar').style.width = `${state.xp}%`;
            document.getElementById('xpText').innerText = `${state.xp} / 100`;
            document.getElementById('waterTxt').innerText = `${state.water.toFixed(2)}L`;
            
            document.getElementById('mealLog').innerHTML = state.meals.slice(-3).map(m => 
                `<div class="item-log">🥗 ${m}</div>`
            ).join('');
        }

        function showNotif(msg) {
            const n = document.getElementById('notif');
            n.innerText = msg; n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 3000);
        }

        render();
    </script>
</body>
</html>
