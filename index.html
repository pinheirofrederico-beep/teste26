<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOHABIT OS | Ultimate Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #0070ff;
            --bg: #050505;
            --surface: #111111;
            --text: #ffffff;
            --text-dim: #777;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; transition: all 0.3s ease; }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #001a11 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #000d1a 0%, transparent 40%);
            min-height: 100vh;
        }

        /* --- NAVEGAÇÃO --- */
        nav {
            height: 70px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; background: linear-gradient(var(--primary), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-top {
            background: var(--primary);
            color: black;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* --- LAYOUT --- */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .hero { margin-bottom: 50px; text-align: center; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        /* --- CARDS --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }

        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,255,136,0.1); }

        h3 { color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        /* --- HIDRATAÇÃO --- */
        .water-ui { display: flex; align-items: center; gap: 15px; margin-top: 20px; }
        .water-bar { flex: 1; height: 12px; background: #222; border-radius: 6px; overflow: hidden; }
        .water-fill { height: 100%; background: var(--secondary); width: 0%; box-shadow: 0 0 15px var(--secondary); }

        .btn-add {
            width: 45px; height: 45px; border-radius: 50%; border: none; 
            background: var(--primary); color: black; font-weight: 800; cursor: pointer;
        }

        /* --- REFEIÇÕES --- */
        .meal-input {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; color: white; margin-bottom: 15px;
        }

        .meal-item {
            padding: 10px; background: rgba(255,255,255,0.05); 
            border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem;
            cursor: pointer;
        }
        .meal-item:hover { background: rgba(0,255,136,0.1); }

        /* --- MODAL --- */
        .modal {
            display: none; position: fixed; z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            align-items: center; justify-content: center;
        }

        .modal-content {
            background: var(--surface); padding: 40px; border-radius: 30px;
            border: 1px solid var(--primary); max-width: 500px; text-align: center;
        }

        /* --- NOTIFICAÇÃO --- */
        #notif {
            position: fixed; bottom: 20px; right: 20px; 
            background: var(--primary); color: black; padding: 15px 25px;
            border-radius: 12px; font-weight: 700; display: none;
            z-index: 3000;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BIOHABIT.OS</div>
        <a href="livros2.html" class="btn-top">BIBLIOTECA PRO</a>
    </nav>

    <div class="container">
        <header class="hero">
            <h1 id="greeting">Carregando...</h1>
            <p>Seu progresso é salvo <span style="color: var(--primary)">automaticamente</span>.</p>
        </header>

        <div class="grid">
            <div class="card">
                <h3>💧 Hidratação</h3>
                <div class="water-ui">
                    <span id="waterCount">0.0L</span>
                    <div class="water-bar"><div class="water-fill" id="waterFill"></div></div>
                    <button class="btn-add" onclick="addWater(0.25)">+</button>
                </div>
                <button class="btn-add" style="width:100%; border-radius: 10px; margin-top:15px;" onclick="openModal('agua')">Dica de Especialista</button>
            </div>

            <div class="card">
                <h3>🍎 Alimentação</h3>
                <input type="text" id="mealIn" class="meal-input" placeholder="Digite e aperte Enter...">
                <div id="mealList"></div>
                <button class="btn-add" style="width:100%; border-radius: 10px; margin-top:15px; background: var(--secondary); color:white" onclick="openModal('dieta')">Bio-Estratégia</button>
            </div>

            <div class="card">
                <h3>🏋️ Treino do Dia</h3>
                <p id="workoutDesc">Foco: Hipertrofia A</p>
                <div style="height: 6px; background: #333; margin: 15px 0; border-radius: 3px;">
                    <div style="width: 60%; height: 100%; background: var(--primary);"></div>
                </div>
                <button class="btn-add" style="width:100%; border-radius: 10px;" onclick="openModal('treino')">Ver Dica de Execução</button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="modalTitle" style="color: var(--primary); margin-bottom: 20px;"></h2>
            <p id="modalText" style="line-height: 1.6; margin-bottom: 30px;"></p>
            <button class="btn-top" onclick="closeModal()" style="width: 100%; border: none; cursor: pointer;">ENTENDI</button>
        </div>
    </div>

    <div id="notif">Sucesso!</div>

    <script>
        // Dados e Dicas
        const info = {
            agua: { t: "Hidratação Inteligente", txt: "Beba 35ml de água para cada kg de peso corporal. Adicione limão para equilibrar o pH." },
            dieta: { t: "Nutrição Avançada", txt: "Proteínas no café da manhã reduzem a fome em até 30% ao longo do dia." },
            treino: { t: "Máxima Performance", txt: "O descanso entre séries é tão importante quanto o peso. Use 90 segundos para força máxima." }
        };

        let state = JSON.parse(localStorage.getItem('bio_data')) || { water: 0, meals: [] };

        window.onload = () => {
            updateUI();
            setGreeting();
        };

        function setGreeting() {
            const h = new Date().getHours();
            document.getElementById('greeting').innerText = h < 12 ? "Bom dia, Atleta!" : h < 18 ? "Boa tarde, Campeão!" : "Boa noite, Mestre!";
        }

        function addWater(v) {
            state.water += v;
            saveAndRefres();
            showNotif(`+${v}L Adicionados!`);
        }

        document.getElementById('mealIn').addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && e.target.value !== "") {
                state.meals.push(e.target.value);
                e.target.value = "";
                saveAndRefres();
                showNotif("Refeição salva!");
            }
        });

        function saveAndRefres() {
            localStorage.setItem('bio_data', JSON.stringify(state));
            updateUI();
        }

        function updateUI() {
            document.getElementById('waterCount').innerText = state.water.toFixed(2) + "L";
            document.getElementById('waterFill').style.width = Math.min((state.water / 3) * 100, 100) + "%";
            
            document.getElementById('mealList').innerHTML = state.meals.slice(-3).map(m => 
                `<div class="meal-item">🍴 ${m}</div>`
            ).join('');
        }

        function openModal(key) {
            document.getElementById('modalTitle').innerText = info[key].t;
            document.getElementById('modalText').innerText = info[key].txt;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function showNotif(msg) {
            const n = document.getElementById('notif');
            n.innerText = msg; n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
